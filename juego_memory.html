<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBA Memory Challenge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-back: #1e293b;
            --card-front: #00d4ff;
            --text: #f8fafc;
            --accent: #00d4ff;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }

        .card {
            aspect-ratio: 3/4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { cursor: default; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(circle at center, #2d3e50 0%, #1e293b 100%);
        }

        .card-back i {
            font-size: 2.5rem;
            color: rgba(255,255,255,0.05);
        }

        .card-front {
            background-color: #24344d;
            transform: rotateY(180deg);
            border-color: var(--accent);
        }

        .card.matched .card-front {
            border-color: var(--success);
            background-color: #064e3b;
        }

        .card-front i { font-size: 2rem; margin-bottom: 10px; color: var(--accent); }
        .card.matched .card-front i { color: var(--success); }
        .card-front span { font-size: 0.8rem; font-weight: 800; text-align: center; }

        .controls { margin-top: 30px; }
        .btn-restart {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-restart:hover { transform: scale(1.05); filter: brightness(1.1); }

        @media (max-width: 480px) {
            .game-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .card-front i { font-size: 1.2rem; }
            .card-front span { font-size: 0.6rem; }
        }

        /* Modal Victoria */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .modal.active { display: flex; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>DBA Memory Challenge</h1>

    <div class="stats">
        <div>Intentos: <span id="moves">0</span></div>
        <div>Tiempo: <span id="timer">00:00</span></div>
    </div>

    <div class="game-grid" id="grid">
        <!-- Cartas generadas por JS -->
    </div>

    <div class="controls">
        <button class="btn-restart" onclick="initGame()">Reiniciar Juego</button>
    </div>

    <div class="modal" id="winModal">
        <i class="fas fa-trophy" style="font-size: 5rem; color: #fbbf24; margin-bottom: 20px;"></i>
        <h2>¡Desafío Completado!</h2>
        <p id="winStats"></p>
        <button class="btn-restart" onclick="initGame()" style="margin-top: 20px;">Jugar de Nuevo</button>
    </div>

    <script>
        const cardsData = [
            { icon: 'fa-database', name: 'ACID' },
            { icon: 'fa-bolt', name: 'INDEX' },
            { icon: 'fa-link-slash', name: 'DEADLOCK' },
            { icon: 'fa-layer-group', name: 'SHARDING' },
            { icon: 'fa-clone', name: 'REPLICA' },
            { icon: 'fa-floppy-disk', name: 'BACKUP' },
            { icon: 'fa-magnifying-glass', name: 'QUERY' },
            { icon: 'fa-arrow-right-arrow-left', name: 'TRAN' }
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let interval = null;
        let isLock = false;

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards = [...cardsData, ...cardsData];
            shuffle(cards);
            
            moves = 0;
            matchedPairs = 0;
            timer = 0;
            isLock = false;
            flippedCards = [];
            document.getElementById('moves').textContent = '0';
            document.getElementById('winModal').classList.remove('active');
            
            clearInterval(interval);
            startTimer();

            cards.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = data.name;
                card.innerHTML = `
                    <div class="card-face card-back"><i class="fas fa-server"></i></div>
                    <div class="card-face card-front">
                        <i class="fas ${data.icon}"></i>
                        <span>${data.name}</span>
                    </div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startTimer() {
            interval = setInterval(() => {
                timer++;
                const mins = Math.floor(timer / 60).toString().padStart(2, '0');
                const secs = (timer % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function flipCard(card) {
            if (isLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.name === card2.dataset.name) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                flippedCards = [];
                isLock = false;
                
                if (matchedPairs === cardsData.length) {
                    victory();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLock = false;
                }, 1000);
            }
        }

        function victory() {
            clearInterval(interval);
            const timeText = document.getElementById('timer').textContent;
            document.getElementById('winStats').textContent = `Completado en ${moves} intentos y ${timeText}`;
            document.getElementById('winModal').classList.add('active');
        }

        // Iniciar al cargar
        initGame();
    </script>
</body>
</html>
