<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Tuner Challenge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #00d4ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: var(--accent);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: rgba(248,250,252,0.6);
            margin-bottom: 30px;
        }

        .level-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .level-btn {
            background: var(--panel);
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .level-btn:hover { border-color: var(--accent); }
        .level-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.1); }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 250px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .query-panel {
            background: var(--panel);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .query-title {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .code-block {
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 20px;
            font-size: 0.95rem;
            line-height: 1.8;
            overflow-x: auto;
            position: relative;
        }

        .code-line { margin: 5px 0; }
        .keyword { color: #ff79c6; font-weight: bold; }
        .table { color: #8be9fd; }
        .column { color: #50fa7b; }
        .operator { color: #f1fa8c; }

        .drop-zone {
            display: inline-block;
            background: rgba(239, 68, 68, 0.2);
            border: 2px dashed var(--danger);
            padding: 4px 12px;
            border-radius: 4px;
            min-width: 120px;
            min-height: 30px;
            vertical-align: middle;
            transition: 0.3s;
        }

        .drop-zone.drag-over {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent);
        }

        .drop-zone.filled {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
            border-style: solid;
        }

        .toolbox {
            background: var(--panel);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .toolbox h3 {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tool-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: grab;
            transition: 0.3s;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .tool-item:active { cursor: grabbing; transform: scale(0.95); }
        .tool-item:hover { border-color: var(--accent); background: rgba(0,212,255,0.1); }
        .tool-item.used { opacity: 0.3; pointer-events: none; }

        .metrics {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .metric {
            background: var(--panel);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1;
            min-width: 150px;
        }

        .metric-label { font-size: 0.75rem; color: rgba(248,250,252,0.6); }
        .metric-value { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }

        .btn-check {
            width: 100%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-check:hover { transform: scale(1.02); }

        .feedback {
            background: var(--panel);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--warning);
            display: none;
        }

        .feedback.active { display: block; }
        .feedback.success { border-color: var(--success); }
        .feedback.error { border-color: var(--danger); }

        @media (max-width: 768px) {
            .game-area { grid-template-columns: 1fr; }
            .code-block { font-size: 0.8rem; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-wrench"></i> Query Tuner Challenge</h1>
        <p class="subtitle">Optimiza la consulta arrastrando las herramientas correctas</p>

        <div class="level-selector">
            <button class="level-btn active" onclick="loadLevel(0)">Nivel 1: Índice Faltante</button>
            <button class="level-btn" onclick="loadLevel(1)">Nivel 2: Estadísticas</button>
            <button class="level-btn" onclick="loadLevel(2)">Nivel 3: Join Hint</button>
        </div>

        <div class="game-area">
            <div class="query-panel">
                <div class="query-title">Query Lenta (Performance Actual: <span id="performance" style="color: var(--danger);">BAJA</span>)</div>
                <div class="code-block" id="queryCode"></div>
                
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-label">Tiempo Ejecución</div>
                        <div class="metric-value" style="color: var(--danger);" id="execTime">8.5s</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Lecturas Lógicas</div>
                        <div class="metric-value" style="color: var(--warning);" id="reads">125K</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">CPU</div>
                        <div class="metric-value" style="color: var(--danger);" id="cpu">95%</div>
                    </div>
                </div>

                <button class="btn-check" onclick="checkSolution()">Validar Optimización</button>
                
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="toolbox">
                <h3><i class="fas fa-toolbox"></i> Herramientas</h3>
                <div id="toolbox"></div>
            </div>
        </div>
    </div>

    <script>
        const levels = [
            {
                code: `<span class="keyword">SELECT</span> <span class="column">OrderID</span>, <span class="column">CustomerName</span>, <span class="column">OrderDate</span>
<span class="keyword">FROM</span> <span class="table">Orders</span>
<span class="keyword">WHERE</span> <span class="column">OrderDate</span> <span class="operator">BETWEEN</span> '2024-01-01' <span class="keyword">AND</span> '2024-12-31'
<span class="keyword">ORDER BY</span> <span class="column">OrderDate</span> <span class="keyword">DESC</span>`,
                dropZones: 1,
                tools: ['INDEX (OrderDate)', 'NOLOCK', 'RECOMPILE', 'MAXDOP 1'],
                solution: 'INDEX (OrderDate)',
                hint: 'La query filtra y ordena por OrderDate. ¿Qué optimización ayudaría?'
            },
            {
                code: `<span class="keyword">SELECT</span> <span class="column">ProductID</span>, <span class="keyword">COUNT</span>(*) <span class="keyword">AS</span> Total
<span class="keyword">FROM</span> <span class="table">Sales</span>
<span class="keyword">WHERE</span> <span class="column">Region</span> = 'North'
<span class="keyword">GROUP BY</span> <span class="column">ProductID</span>`,
                dropZones: 1,
                tools: ['UPDATE STATISTICS', 'PARTITION TABLE', 'ADD MEMORY', 'DISABLE TRIGGERS'],
                solution: 'UPDATE STATISTICS',
                hint: 'El optimizador puede elegir un mal plan si las estadísticas están viejas.'
            },
            {
                code: `<span class="keyword">SELECT</span> o.<span class="column">OrderID</span>, c.<span class="column">CustomerName</span>
<span class="keyword">FROM</span> <span class="table">Orders</span> o
<span class="keyword">INNER JOIN</span> <span class="table">Customers</span> c <span class="keyword">ON</span> o.<span class="column">CustomerID</span> = c.<span class="column">CustomerID</span>
<span class="keyword">WHERE</span> o.<span class="column">Status</span> = 'Pending'`,
                dropZones: 1,
                tools: ['HASH JOIN', 'LOOP JOIN', 'COLUMNSTORE INDEX', 'COMPRESS TABLE'],
                solution: 'HASH JOIN',
                hint: 'Para grandes volúmenes sin índices, ¿qué tipo de join es más eficiente?'
            }
        ];

        let currentLevel = 0;
        let droppedTool = null;

        function loadLevel(levelIdx) {
            currentLevel = levelIdx;
            const level = levels[levelIdx];
            
            document.querySelectorAll('.level-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === levelIdx);
            });

            const codeBlock = document.getElementById('queryCode');
            codeBlock.innerHTML = level.code;

            const toolbox = document.getElementById('toolbox');
            toolbox.innerHTML = '';
            level.tools.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'tool-item';
                div.textContent = tool;
                div.draggable = true;
                div.ondragstart = (e) => {
                    e.dataTransfer.setData('tool', tool);
                };
                toolbox.appendChild(div);
            });

            createDropZone();
            resetMetrics();
            document.getElementById('feedback').classList.remove('active', 'success', 'error');
            droppedTool = null;
        }

        function createDropZone() {
            const codeBlock = document.getElementById('queryCode');
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.textContent = '[ARRASTRAR AQUÍ]';
            
            dropZone.ondragover = (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            };

            dropZone.ondragleave = () => {
                dropZone.classList.remove('drag-over');
            };

            dropZone.ondrop = (e) => {
                e.preventDefault();
                const tool = e.dataTransfer.getData('tool');
                dropZone.textContent = tool;
                dropZone.classList.remove('drag-over');
                dropZone.classList.add('filled');
                droppedTool = tool;
                
                document.querySelectorAll('.tool-item').forEach(t => {
                    if (t.textContent === tool) t.classList.add('used');
                });
            };

            codeBlock.appendChild(document.createElement('br'));
            codeBlock.appendChild(document.createElement('br'));
            const comment = document.createElement('span');
            comment.style.color = '#6272a4';
            comment.textContent = '-- Aplicar optimización: ';
            codeBlock.appendChild(comment);
            codeBlock.appendChild(dropZone);
        }

        function checkSolution() {
            const level = levels[currentLevel];
            const feedback = document.getElementById('feedback');
            feedback.classList.add('active');

            if (droppedTool === level.solution) {
                feedback.classList.remove('error');
                feedback.classList.add('success');
                feedback.innerHTML = `<strong><i class="fas fa-check-circle"></i> ¡Correcto!</strong><br>${level.hint}`;
                updateMetrics(true);
            } else {
                feedback.classList.remove('success');
                feedback.classList.add('error');
                feedback.innerHTML = `<strong><i class="fas fa-times-circle"></i> Incorrecto</strong><br>${level.hint}`;
            }
        }

        function updateMetrics(success) {
            if (success) {
                document.getElementById('performance').textContent = 'ALTA';
                document.getElementById('performance').style.color = 'var(--success)';
                document.getElementById('execTime').textContent = '0.12s';
                document.getElementById('execTime').style.color = 'var(--success)';
                document.getElementById('reads').textContent = '2.5K';
                document.getElementById('reads').style.color = 'var(--success)';
                document.getElementById('cpu').textContent = '8%';
                document.getElementById('cpu').style.color = 'var(--success)';
            }
        }

        function resetMetrics() {
            document.getElementById('performance').textContent = 'BAJA';
            document.getElementById('performance').style.color = 'var(--danger)';
            document.getElementById('execTime').textContent = '8.5s';
            document.getElementById('execTime').style.color = 'var(--danger)';
            document.getElementById('reads').textContent = '125K';
            document.getElementById('reads').style.color = 'var(--warning)';
            document.getElementById('cpu').textContent = '95%';
            document.getElementById('cpu').style.color = 'var(--danger)';
        }

        loadLevel(0);
    </script>
</body>
</html>
